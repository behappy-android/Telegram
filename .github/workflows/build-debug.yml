name: Build debug APK

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # для прикрепления APK к Release при tag push

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-35
            build-tools;35.0.0
            build-tools;30.0.3
            ndk;21.4.7075529
            cmake;3.22.1

      - name: Patch dx for build-tools 35.0.0
        run: |
          if [ -f "$ANDROID_HOME/build-tools/30.0.3/dx" ]; then
            cp $ANDROID_HOME/build-tools/30.0.3/dx $ANDROID_HOME/build-tools/35.0.0/dx
            cp $ANDROID_HOME/build-tools/30.0.3/lib/dx.jar $ANDROID_HOME/build-tools/35.0.0/lib/dx.jar
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build AppStandalone debug APK
        run: ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/21.4.7075529

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find TMessagesProj_AppStandalone/build/outputs/apk -name '*.apk' | head -1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=behappy-android-$(date +%Y%m%d)-$(git rev-parse --short HEAD).apk" >> "$GITHUB_OUTPUT"
          ls -la "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Attach APK to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
